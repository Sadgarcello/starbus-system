<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TruRec — Top 10 Rankings</title>
  <meta name="description" content="Top 10 ranked fighters on TruRec with photos, flags, and short bios." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Anton&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#0052cc;           /* Core blue */
      --primary-strong:#2f54eb;    /* Stronger blue */
      --nav:#0047ab;               /* Navbar blue */
      --accent:#ffcc00;            /* Yellow accent */
      --dark:#0f0f10;              /* Dark surface */
      --card-bg:#ffffff;           /* Card base */
      --muted:#5b5e66;            /* Muted text */
      --maxw:1200px;               /* Container width */
      --radius-card:20px;          /* Card radius */
      --radius-pill:999px;         /* Pill radius */
      --shadow-card:0 10px 24px rgba(0,0,0,.28);
      --shadow-card-hover:0 16px 34px rgba(0,0,0,.34);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Montserrat',sans-serif;background:#fff;color:#000;}

    /* ===== Navbar ===== */
    .navbar{background:var(--nav);color:#fff;width:100%}
    .navbar .inner{max-width:var(--maxw);margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff}
    .brand img{height:44px;width:auto;border-radius:10px}
    .brand h1{font-family:'Anton',sans-serif;font-size:28px;letter-spacing:.5px}
    .add-link{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#131313;font-weight:900;text-decoration:none;padding:10px 16px;border-radius:var(--radius-pill);box-shadow:0 6px 16px rgba(255,204,0,.35);transition:transform .15s ease, box-shadow .15s ease}
    .add-link:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(255,204,0,.45)}

    /* ===== Header ===== */
    .header{max-width:var(--maxw);margin:28px auto 10px;padding:0 16px;display:flex;align-items:end;justify-content:space-between;gap:12px}
    .title{font-family:'Anton',sans-serif;font-size:clamp(28px,4vw,54px);line-height:1;color:#000;letter-spacing:.5px;text-transform:uppercase}
    .subtitle{color:#444;font-style:italic}

    /* ===== Grids ===== */
    .grid{max-width:var(--maxw);margin:18px auto 0;padding:0 16px;display:grid;gap:22px}
    .grid-top3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-bottom:22px}
    .grid-rest{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-bottom:60px}

    /* Desktop layout: top3 in 3 columns, rest in 4 columns */
    @media (min-width:1100px){
      .grid-top3{grid-template-columns:repeat(3,1fr)}
      .grid-rest{grid-template-columns:repeat(4,1fr)}
    }

    .card{position:relative;background:var(--card-bg);border-radius:var(--radius-card);overflow:hidden;box-shadow:var(--shadow-card);transition:transform .18s ease, box-shadow .18s ease;display:flex;flex-direction:column}
    .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-card-hover)}

    .media{position:relative;aspect-ratio:4/5;background:radial-gradient(120% 80% at 50% 10%,#1c1c1f 0,var(--dark) 40%,var(--dark) 100%);display:grid;place-items:center}
    .photo{width:100%;height:100%;object-fit:contain}

    .rank-badge{position:absolute;top:12px;left:12px;background:var(--accent);color:#131313;font-weight:900;border-radius:10px;padding:6px 10px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
    .flag{position:absolute;right:12px;bottom:12px;width:34px;height:22px;object-fit:cover;border-radius:4px;box-shadow:0 1px 6px rgba(0,0,0,.35)}

    .content{padding:14px 14px 16px;flex:1;display:flex;flex-direction:column}
    .name{margin:0 0 6px;font-weight:900;font-size:18px;letter-spacing:.3px;text-transform:uppercase}
    .meta{margin:0 0 10px;color:var(--muted);font-weight:600;font-size:13px}
    .bio{margin:0 0 12px;color:#222;line-height:1.45;flex-grow:1}

    .actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:10px}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-width:132px;padding:12px 20px;border-radius:var(--radius-pill);font-weight:800;letter-spacing:.2px;text-decoration:none;text-align:center;white-space:nowrap}
    .btn-primary{background:var(--primary);color:#fff;box-shadow:0 6px 16px rgba(0,82,204,.35)}
    .btn-primary:hover{background:var(--primary-strong)}
    .btn-ghost{border:1px solid #e5e7eb;color:#111;background:#fff}

    /* Footer */
    footer{background:var(--primary);color:#fff;padding:28px 16px}
    .foot-inner{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .crumbs{font-size:14px}
    .crumbs a{color:#fff;text-decoration:underline}

    @media (max-width:720px){
      .foot-inner{flex-direction:column;gap:10px;text-align:center}
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="inner">
      <a class="brand" href="/">
        <img src="static/images/logo/truboxing-logo.png" alt="TruRec" />
        <h1>TruRec Rankings</h1>
      </a>
      <a class="add-link" href="#" title="Add/Update rankings via form">Add / Update Rankings</a>
    </div>
  </nav>

  <!-- Header -->
  <header class="header">
    <div>
      <div class="title">Top 10 — Malaysia</div>
      <div class="subtitle">Updated weekly • Criteria: results, activity, opposition, and momentum</div>
    </div>
  </header>

  <!-- Ranking Grids -->
  <section class="grid grid-top3" id="gridTop3"></section>
  <section class="grid grid-rest" id="gridRest"></section>

  <!-- Footer -->
  <footer>
    <div class="foot-inner">
      <div>© <span id="year"></span> TruRec. No politics, just boxing.</div>
      <div class="crumbs">
        <a href="/">Home</a> · <a href="/fighters">Fighters</a> · <a href="/events">Events</a>
      </div>
    </div>
  </footer>

  <script>
    // ===== Full Rankings Data (sample) =====
    const rankings = [
      { rank: 1, name: 'IMRAN HANAFI', nickname: 'THE BAZOOKA', weight: 'Lightweight', country: 'MY', flag: 'static/images/flags/malaysia.png', photo: 'static/images/fighters/profiles/bazooka.png', profileUrl: '/fighter/bazooka', bio: '7–0 in TruBoxing bouts this year, 4 KOs. Beat two ranked opponents and defended his spot twice in August.' },
      { rank: 2, name: 'DANNY BOYZ', nickname: '', weight: 'Lightweight', country: 'MY', flag: 'static/images/flags/malaysia.png', photo: 'static/images/fighters/profiles/danny.png', profileUrl: '/fighter/danny', bio: 'High-volume pressure, three-fight streak, edged a split decision over a top-5 rival.' },
      { rank: 3, name: 'FAVIEN JANANG', nickname: 'SUPERKAI', weight: 'Lightweight', country: 'MY', flag: 'static/images/flags/malaysia.png', photo: 'static/images/fighters/profiles/superkai.png', profileUrl: '/fighter/superkai', bio: 'Elite footwork and jab—dominant UD in last outing; needs one more top win to challenge #1.' },
      { rank: 4, name: 'ABANG KOROY', nickname: '', weight: 'Middleweight', country: 'MY', flag: 'static/images/flags/malaysia.png', photo: 'static/images/fighters/profiles/koroy.png', profileUrl: '/fighter/koroy', bio: 'Moved down a class, looked sharper; big body work carried him to a late stoppage.' },
      { rank: 5, name: 'AWAB', nickname: '', weight: 'Heavyweight', country: 'SD', flag: 'static/images/flags/sudan.png', photo: 'static/images/fighters/profiles/awab.png', profileUrl: '/fighter/awab', bio: 'Power puncher with improving defense; outpointed a veteran in July and rallied in August.' },
      { rank: 6, name: 'ALI MASKUR', nickname: '', weight: 'Heavyweight', country: 'ID', flag: 'static/images/flags/indonesia.png', photo: 'static/images/fighters/profiles/ali.png', profileUrl: '/fighter/ali', bio: '1–1 vs ranked opponents this season; bounce-back KO keeps him in the mix.' },
      { rank: 7, name: 'AIDIL DANIAL', nickname: 'SUPERBONG', weight: 'Light Heavyweight', country: 'MY', flag: 'static/images/flags/malaysia.png', photo: 'static/images/fighters/profiles/superbong.png', profileUrl: '/fighter/superbong', bio: 'Strong ring IQ and gas tank—won a tactical chess match over 3 rounds.' },
      { rank: 8, name: 'BELLULOK EDISON', nickname: '', weight: 'Middleweight', country: 'MY', flag: 'static/images/flags/malaysia.png', photo: 'static/images/fighters/profiles/bellulok.png', profileUrl: '/fighter/bellulok_edison', bio: 'Heavy hands but inconsistent pace; still dangerous against any style.' },
      { rank: 9, name: 'ABDULLAH FAJAR', nickname: '', weight: 'Welterweight', country: 'ID', flag: 'static/images/flags/indonesia.png', photo: 'static/images/fighters/profiles/abdullah_fajar.png', profileUrl: '/fighter/abdullah_fajar', bio: 'Breakout year with two dominant UDs; stepping up in competition next.' },
      { rank: 10, name: 'AMIRUL AKMAL', nickname: '', weight: 'Welterweight', country: 'MY', flag: 'static/images/flags/malaysia.png', photo: 'static/images/fighters/profiles/amirul.png', profileUrl: '/fighter/amirul', bio: 'Sniper counters and disciplined footwork; needs activity to climb again.' }
    ];

    // Split into top3 and rest
    const top3 = rankings.slice(0,3);
    const rest = rankings.slice(3);

    const gridTop3 = document.getElementById('gridTop3');
    const gridRest = document.getElementById('gridRest');

    function cardTemplate(f){
      return `
        <article class="card">
          <div class="media">
            <span class="rank-badge">#${f.rank}</span>
            <img class="flag" src="${f.flag}" alt="${f.country} flag" />
            <img class="photo" src="${f.photo}" alt="${f.name}" />
          </div>
          <div class="content">
            <h3 class="name">${f.name}${f.nickname?` — ${f.nickname}`:''}</h3>
            <p class="meta">${f.weight} • ${f.country}</p>
            <p class="bio">${f.bio}</p>
            <div class="actions">
              <a class="btn btn-primary" href="${f.profileUrl}">View Profile</a>
              <a class="btn btn-ghost" href="#" title="Suggest edit for ${f.name}">Suggest Edit</a>
            </div>
          </div>
        </article>
      `;
    }

    gridTop3.innerHTML = top3.map(cardTemplate).join('');
    gridRest.innerHTML = rest.map(cardTemplate).join('');

    // Footer year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Admin/Add link — set to your form or admin URL
    // document.querySelector('.add-link').href = 'https://forms.gle/your-form-id';
    // or
    // document.querySelector('.add-link').href = '/admin/rankings';
  </script>
</body>
</html>
