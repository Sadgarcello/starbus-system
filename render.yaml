# Render Blueprint — Starbus (monorepo: app lives in starbus/server).
# https://render.com/docs/blueprint-spec
#
# After first deploy: attach a MySQL-compatible database (same PaaS or external),
# set DB_* and WHATSAPP_NUMBER in the service Environment tab, then run SQL from
# starbus/database/ (see starbus/DEPLOY.md).

services:
  - type: web
    name: starbus
    runtime: node
    rootDir: starbus/server
    plan: free
    buildCommand: npm install    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
